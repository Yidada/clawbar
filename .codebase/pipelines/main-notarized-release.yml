name: Main Notarized Release

trigger:
  change:
    branches: [ main ]
    types: [ submit ]
    notification:
      when: [ failure ]

jobs:
  main_release:
    name: Sign, notarize, and publish Clawbar DMG
    runs-on:
      macos: {}
    timeout: 180
    retry: 1
    auto-cache: false
    envs:
      PRODUCT_NAME: Clawbar
      REPO_NAME: ${{Repo.Name}}
      REPO_PLATFORM_URL: ${{Repo.PlatformURL}}
      EVENT_CHANGE_ID: ${{Event.Change.ID}}
      EVENT_CHANGE_URL: ${{Event.Change.URL}}
      EVENT_TARGET_BRANCH: ${{Event.Change.Target.Branch}}
      APPLE_DEVELOPER_ID_CERT_BASE64: ${{APPLE_DEVELOPER_ID_CERT_BASE64}}
      APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{APPLE_DEVELOPER_ID_CERT_PASSWORD}}
      APPLE_TEAM_ID: ${{APPLE_TEAM_ID}}
      APPLE_NOTARY_KEY_ID: ${{APPLE_NOTARY_KEY_ID}}
      APPLE_NOTARY_ISSUER_ID: ${{APPLE_NOTARY_ISSUER_ID}}
      APPLE_NOTARY_API_KEY_BASE64: ${{APPLE_NOTARY_API_KEY_BASE64}}
      GITLAB_RELEASE_TOKEN: ${{GITLAB_RELEASE_TOKEN}}
    steps:
      - name: Validate macOS environment and required variables
        commands:
          - |
            set -euo pipefail

            for name in \
              APPLE_DEVELOPER_ID_CERT_BASE64 \
              APPLE_DEVELOPER_ID_CERT_PASSWORD \
              APPLE_TEAM_ID \
              APPLE_NOTARY_KEY_ID \
              APPLE_NOTARY_ISSUER_ID \
              APPLE_NOTARY_API_KEY_BASE64 \
              GITLAB_RELEASE_TOKEN
            do
              if [[ -z "${!name:-}" ]]; then
                echo "Missing required Codebase CI variable: $name" >&2
                exit 1
              fi
            done

            if [[ -d /Applications/Xcode_26.2.app/Contents/Developer ]]; then
              export DEVELOPER_DIR=/Applications/Xcode_26.2.app/Contents/Developer
            elif [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
              export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer
            fi

            sw_vers
            xcodebuild -version
            swift --version

            python3 - <<'PY'
            import re
            import subprocess
            import sys

            output = subprocess.check_output(["swift", "--version"], text=True)
            match = re.search(r"Swift version (\d+)\.(\d+)", output)
            if not match:
                print("Unable to parse Swift version from `swift --version`.", file=sys.stderr)
                sys.exit(1)

            version = (int(match.group(1)), int(match.group(2)))
            if version < (6, 2):
                print(
                    "Clawbar requires Swift 6.2+. The current Codebase CI macOS image is too old. "
                    "Use a newer macOS image or a self-hosted macOS runner.",
                    file=sys.stderr,
                )
                sys.exit(1)
            PY

      - name: Build, sign, notarize, upload, and attach release asset
        commands:
          - |
            set -euo pipefail

            if [[ -d /Applications/Xcode_26.2.app/Contents/Developer ]]; then
              export DEVELOPER_DIR=/Applications/Xcode_26.2.app/Contents/Developer
            elif [[ -d /Applications/Xcode.app/Contents/Developer ]]; then
              export DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer
            fi

            APP_VERSION="$(date -u +"%Y.%m.%d")"
            SHORT_SHA="$(git rev-parse --short HEAD)"
            BUILD_ID="${EVENT_CHANGE_ID:-$(date -u +"%Y%m%d%H%M%S")}"
            RELEASE_TAG="main-${BUILD_ID}-${SHORT_SHA}"
            RELEASE_NAME="Main ${BUILD_ID} ${SHORT_SHA}"
            DMG_BASENAME="${PRODUCT_NAME}-${APP_VERSION}-main-${BUILD_ID}-${SHORT_SHA}"
            PACKAGE_VERSION="${RELEASE_TAG}"
            PACKAGE_FILE="${DMG_BASENAME}.dmg"
            ENCODED_REPO_NAME="$(python3 - <<'PY'
            import os
            import urllib.parse

            print(urllib.parse.quote(os.environ["REPO_NAME"], safe=""))
            PY
            )"
            GITLAB_API_ROOT="https://${REPO_PLATFORM_URL}/api/v4/projects/${ENCODED_REPO_NAME}"
            PACKAGE_URL="${GITLAB_API_ROOT}/packages/generic/clawbar/${PACKAGE_VERSION}/${PACKAGE_FILE}"
            RELEASE_ASSET_PATH="/binaries/${PACKAGE_FILE}"
            RELEASE_DOWNLOAD_URL="https://${REPO_PLATFORM_URL}/${REPO_NAME}/-/releases/${RELEASE_TAG}/downloads${RELEASE_ASSET_PATH}"

            TEMP_ROOT="$(mktemp -d "${TMPDIR:-/tmp}/clawbar-codebase-ci.XXXXXX")"
            KEYCHAIN_PATH="${TEMP_ROOT}/clawbar-signing.keychain-db"
            CERT_PATH="${TEMP_ROOT}/clawbar-developer-id.p12"
            API_KEY_PATH="${TEMP_ROOT}/clawbar-notary-api-key.p8"
            KEYCHAIN_PASSWORD="$(uuidgen)"
            export CERT_PATH API_KEY_PATH

            cleanup() {
              security delete-keychain "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
              rm -rf "$TEMP_ROOT"
            }
            trap cleanup EXIT

            python3 - <<'PY'
            import base64
            import os
            from pathlib import Path

            Path(os.environ["CERT_PATH"]).write_bytes(
                base64.b64decode(os.environ["APPLE_DEVELOPER_ID_CERT_BASE64"])
            )
            Path(os.environ["API_KEY_PATH"]).write_bytes(
                base64.b64decode(os.environ["APPLE_NOTARY_API_KEY_BASE64"])
            )
            PY

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
            security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

            security import "$CERT_PATH" \
              -k "$KEYCHAIN_PATH" \
              -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security \
              -T /usr/bin/productsign

            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s \
              -k "$KEYCHAIN_PASSWORD" \
              "$KEYCHAIN_PATH"

            SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application:/ {print $2; exit}')"
            if [[ -z "$SIGNING_IDENTITY" ]]; then
              echo "Unable to find a Developer ID Application identity in the temporary keychain." >&2
              exit 1
            fi

            if [[ "$SIGNING_IDENTITY" != *"(${APPLE_TEAM_ID})"* ]]; then
              echo "Resolved signing identity does not match APPLE_TEAM_ID: $SIGNING_IDENTITY" >&2
              exit 1
            fi

            export APP_VERSION
            export APP_BUILD="${BUILD_ID}"
            export DMG_BASENAME
            export OUTPUT_FORMAT=dmg
            export NOTARIZE=1
            export SIGNING_IDENTITY
            export APPLE_NOTARY_API_KEY_PATH="$API_KEY_PATH"

            ./Scripts/sign_and_notarize.sh

            DMG_PATH="dist/${PACKAGE_FILE}"
            if [[ ! -f "$DMG_PATH" ]]; then
              echo "Expected DMG artifact at $DMG_PATH" >&2
              exit 1
            fi

            if curl --silent --show-error --fail \
              --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
              --head \
              "$PACKAGE_URL" >/dev/null 2>&1; then
              echo "Package already exists in GitLab Package Registry: $PACKAGE_URL"
            else
              curl --fail --show-error --location \
                --header "PRIVATE-TOKEN: ${GITLAB_RELEASE_TOKEN}" \
                --upload-file "$DMG_PATH" \
                "$PACKAGE_URL"
            fi

            export RELEASE_TAG RELEASE_NAME PACKAGE_URL RELEASE_ASSET_PATH RELEASE_DOWNLOAD_URL GITLAB_API_ROOT
            python3 - <<'PY'
            import json
            import os
            import urllib.error
            import urllib.parse
            import urllib.request

            api_root = os.environ["GITLAB_API_ROOT"]
            token = os.environ["GITLAB_RELEASE_TOKEN"]
            release_tag = os.environ["RELEASE_TAG"]
            release_name = os.environ["RELEASE_NAME"]
            package_url = os.environ["PACKAGE_URL"]
            release_asset_path = os.environ["RELEASE_ASSET_PATH"]
            release_download_url = os.environ["RELEASE_DOWNLOAD_URL"]
            merge_request_url = os.environ.get("EVENT_CHANGE_URL", "")

            description = (
                f"Automated signed and notarized build for {os.popen('git rev-parse HEAD').read().strip()} "
                f"merged into {os.environ.get('EVENT_TARGET_BRANCH', 'main')}.\n\n"
                f"Merge request: {merge_request_url}"
            )

            encoded_tag = urllib.parse.quote(release_tag, safe="")
            release_url = f"{api_root}/releases/{encoded_tag}"
            links_url = f"{release_url}/assets/links"
            headers = {
                "PRIVATE-TOKEN": token,
                "Content-Type": "application/json",
            }

            def request_json(method, url, payload=None, expected=(200, 201)):
                data = None if payload is None else json.dumps(payload).encode("utf-8")
                request = urllib.request.Request(url, data=data, method=method, headers=headers)
                try:
                    with urllib.request.urlopen(request) as response:
                        body = response.read()
                        if response.status not in expected:
                            raise RuntimeError(f"Unexpected HTTP {response.status}: {body.decode('utf-8', 'replace')}")
                        return json.loads(body.decode("utf-8") or "{}")
                except urllib.error.HTTPError as error:
                    body = error.read().decode("utf-8", "replace")
                    if error.code not in expected:
                        raise RuntimeError(f"{method} {url} failed with HTTP {error.code}: {body}") from error
                    return json.loads(body or "{}")

            try:
                request_json("GET", release_url, expected=(200,))
                request_json(
                    "PUT",
                    release_url,
                    {
                        "name": release_name,
                        "description": description,
                    },
                    expected=(200,),
                )
            except RuntimeError as error:
                if "HTTP 404" not in str(error):
                    raise
                request_json(
                    "POST",
                    f"{api_root}/releases",
                    {
                        "name": release_name,
                        "tag_name": release_tag,
                        "ref": os.popen("git rev-parse HEAD").read().strip(),
                        "description": description,
                    },
                    expected=(201,),
                )

            existing_links = request_json("GET", links_url, expected=(200,))
            link_name = "Signed and notarized DMG"
            matching_link = next((item for item in existing_links if item.get("name") == link_name), None)
            link_payload = {
                "name": link_name,
                "url": package_url,
                "filepath": release_asset_path,
                "link_type": "package",
            }

            if matching_link:
                request_json("PUT", f"{links_url}/{matching_link['id']}", link_payload, expected=(200,))
            else:
                request_json("POST", links_url, link_payload, expected=(201,))

            print(f"Release asset URL: {release_download_url}")
            PY
