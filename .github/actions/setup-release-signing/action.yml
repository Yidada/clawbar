name: Setup Release Signing
description: Import the Developer ID certificate into a temporary keychain and write the App Store Connect notary API key to a temporary file.

inputs:
  apple-developer-id-cert-base64:
    description: Base64-encoded Developer ID Application .p12 bundle.
    required: true
  apple-developer-id-cert-password:
    description: Password used when exporting the Developer ID Application .p12 bundle.
    required: true
  apple-team-id:
    description: Apple Developer Team ID expected to appear in the imported signing identity.
    required: true
  apple-notary-api-key-base64:
    description: Base64-encoded App Store Connect API private key (.p8).
    required: true

outputs:
  keychain-path:
    description: Path to the temporary keychain containing the imported signing identity.
    value: ${{ steps.keychain.outputs.keychain_path }}
  signing-identity:
    description: Resolved Developer ID Application signing identity.
    value: ${{ steps.keychain.outputs.signing_identity }}
  api-key-path:
    description: Path to the decoded App Store Connect API private key (.p8).
    value: ${{ steps.notary.outputs.api_key_path }}

runs:
  using: composite
  steps:
    - name: Import Developer ID certificate
      id: keychain
      shell: bash
      env:
        APPLE_DEVELOPER_ID_CERT_BASE64: ${{ inputs.apple-developer-id-cert-base64 }}
        APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ inputs.apple-developer-id-cert-password }}
        APPLE_TEAM_ID: ${{ inputs.apple-team-id }}
        CERT_PATH: ${{ runner.temp }}/clawbar-developer-id.p12
      run: |
        set -euo pipefail

        KEYCHAIN_PATH="$RUNNER_TEMP/clawbar-signing.keychain-db"
        KEYCHAIN_PASSWORD="$(uuidgen)"
        CERT_PATH="$RUNNER_TEMP/clawbar-developer-id.p12"

        python3 - <<'PY'
        import base64
        import os
        from pathlib import Path

        cert_data = os.environ["APPLE_DEVELOPER_ID_CERT_BASE64"]
        Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(cert_data))
        PY

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
        security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

        security import "$CERT_PATH" \
          -k "$KEYCHAIN_PATH" \
          -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/security \
          -T /usr/bin/productsign

        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s \
          -k "$KEYCHAIN_PASSWORD" \
          "$KEYCHAIN_PATH"

        IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application:/ {print $2; exit}')"
        if [[ -z "$IDENTITY" ]]; then
          echo "Unable to find a Developer ID Application identity in the temporary keychain." >&2
          exit 1
        fi

        if [[ "$IDENTITY" != *"(${APPLE_TEAM_ID})"* ]]; then
          echo "Resolved signing identity does not match APPLE_TEAM_ID: $IDENTITY" >&2
          exit 1
        fi

        echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
        echo "signing_identity=$IDENTITY" >> "$GITHUB_OUTPUT"

    - name: Write notary API key
      id: notary
      shell: bash
      env:
        APPLE_NOTARY_API_KEY_BASE64: ${{ inputs.apple-notary-api-key-base64 }}
        API_KEY_PATH: ${{ runner.temp }}/clawbar-notary-api-key.p8
      run: |
        set -euo pipefail

        API_KEY_PATH="$RUNNER_TEMP/clawbar-notary-api-key.p8"
        python3 - <<'PY'
        import base64
        import os
        from pathlib import Path

        key_data = os.environ["APPLE_NOTARY_API_KEY_BASE64"]
        Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(key_data))
        PY

        echo "api_key_path=$API_KEY_PATH" >> "$GITHUB_OUTPUT"
