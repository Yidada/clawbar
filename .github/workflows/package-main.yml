name: Package Main App

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      dmg_basename: ${{ steps.meta.outputs.dmg_basename }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute package metadata
        id: meta
        shell: bash
        run: |
          DATE_VERSION="$(date -u +%Y.%m.%d)"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          DMG_BASENAME="Clawbar-main-latest"
          echo "version=$DATE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_basename=$DMG_BASENAME" >> "$GITHUB_OUTPUT"

  package:
    needs: prepare
    uses: ./.github/workflows/package-signed-dmg.yml
    secrets: inherit
    with:
      app-version: ${{ needs.prepare.outputs.version }}
      app-build: ${{ needs.prepare.outputs.build_number }}
      dmg-basename: ${{ needs.prepare.outputs.dmg_basename }}
      artifact-name: clawbar-main-${{ needs.prepare.outputs.short_sha }}
      artifact-retention-days: 14
      publish-release: true
      release-prerelease: true
      release-tag: main-build
      release-title: Clawbar Main Build
      release-notes: |
        Automated notarized main build for commit ${{ github.sha }}.

        Asset: ${{ needs.prepare.outputs.dmg_basename }}.dmg
