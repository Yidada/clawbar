name: Release App

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-app-main
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(date -u +'%Y.%m.%d')"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAG="main-build-${BUILD_NUMBER}"
          ZIP_BASENAME="Clawbar-${VERSION}-${BUILD_NUMBER}-${SHORT_SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip_basename=$ZIP_BASENAME" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test -v

      - name: Package app
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
          APP_BUILD: ${{ steps.meta.outputs.build_number }}
          ZIP_BASENAME: ${{ steps.meta.outputs.zip_basename }}
        run: ./Scripts/package_app.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawbar-app-${{ steps.meta.outputs.build_number }}
          path: |
            dist/Clawbar.app
            dist/${{ steps.meta.outputs.zip_basename }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release delete "${{ steps.meta.outputs.tag }}" --yes --cleanup-tag
          fi
          gh release create "${{ steps.meta.outputs.tag }}" \
            "dist/${{ steps.meta.outputs.zip_basename }}.zip" \
            --title "Clawbar main build ${{ steps.meta.outputs.build_number }}" \
            --notes "Automated build for commit ${{ github.sha }}."
