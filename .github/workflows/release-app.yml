name: Release App

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

permissions:
  contents: write

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 26.2
        run: |
          sudo xcode-select -s "$DEVELOPER_DIR"
          xcodebuild -version
          swift --version

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          DMG_BASENAME="Clawbar-${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "dmg_basename=$DMG_BASENAME" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test -v

      - name: Set up temporary signing keychain
        id: keychain
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERT_PATH: ${{ runner.temp }}/clawbar-developer-id.p12
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/clawbar-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/clawbar-developer-id.p12"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_data = os.environ["APPLE_DEVELOPER_ID_CERT_BASE64"]
          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(cert_data))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application:/ {print $2; exit}')"
          if [[ -z "$IDENTITY" ]]; then
            echo "Unable to find a Developer ID Application identity in the temporary keychain." >&2
            exit 1
          fi

          if [[ "$IDENTITY" != *"(${APPLE_TEAM_ID})"* ]]; then
            echo "Resolved signing identity does not match APPLE_TEAM_ID: $IDENTITY" >&2
            exit 1
          fi

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "signing_identity=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Write notary API key
        id: notary
        env:
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          API_KEY_PATH: ${{ runner.temp }}/clawbar-notary-api-key.p8
        shell: bash
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/clawbar-notary-api-key.p8"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_data = os.environ["APPLE_NOTARY_API_KEY_BASE64"]
          Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(key_data))
          PY
          echo "api_key_path=$API_KEY_PATH" >> "$GITHUB_OUTPUT"

      - name: Package, sign, notarize, and validate DMG
        env:
          APP_VERSION: ${{ steps.meta.outputs.version }}
          APP_BUILD: ${{ steps.meta.outputs.build_number }}
          DMG_BASENAME: ${{ steps.meta.outputs.dmg_basename }}
          OUTPUT_FORMAT: dmg
          NOTARIZE: 1
          SIGNING_IDENTITY: ${{ steps.keychain.outputs.signing_identity }}
          APPLE_NOTARY_API_KEY_PATH: ${{ steps.notary.outputs.api_key_path }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: ./Scripts/sign_and_notarize.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: clawbar-app-${{ steps.meta.outputs.version }}
          path: |
            dist/Clawbar.app
            dist/${{ steps.meta.outputs.dmg_basename }}.dmg
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DMG_PATH="dist/${{ steps.meta.outputs.dmg_basename }}.dmg"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
          else
            gh release create "$TAG" \
              "$DMG_PATH" \
              --title "Clawbar ${VERSION}" \
              --notes "Automated notarized release for commit ${{ github.sha }}."
          fi

      - name: Clean up temporary signing material
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          security delete-keychain "${{ steps.keychain.outputs.keychain_path }}" >/dev/null 2>&1 || true
          rm -f "${{ steps.notary.outputs.api_key_path }}" >/dev/null 2>&1 || true
