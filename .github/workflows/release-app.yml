name: Release App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      dmg_basename: ${{ steps.meta.outputs.dmg_basename }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          DMG_BASENAME="Clawbar-${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "dmg_basename=$DMG_BASENAME" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    uses: ./.github/workflows/package-signed-dmg.yml
    secrets: inherit
    with:
      app-version: ${{ needs.prepare.outputs.version }}
      app-build: ${{ needs.prepare.outputs.build_number }}
      dmg-basename: ${{ needs.prepare.outputs.dmg_basename }}
      artifact-name: clawbar-app-${{ needs.prepare.outputs.version }}
      publish-release: true
      release-prerelease: false
      release-tag: ${{ needs.prepare.outputs.tag }}
      release-title: Clawbar ${{ needs.prepare.outputs.version }}
      release-notes: Automated notarized release for commit ${{ github.sha }}.
