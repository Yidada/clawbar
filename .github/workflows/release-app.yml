name: Release App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      dmg_basename: ${{ steps.meta.outputs.dmg_basename }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          source version.env
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          RELEASE_BUILD_NUMBER="$BUILD_NUMBER"
          DMG_BASENAME="Clawbar-${VERSION}"
          bash Scripts/validate_release_metadata.sh "$TAG"
          bash Scripts/validate_changelog.sh "$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$RELEASE_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "dmg_basename=$DMG_BASENAME" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            bash Scripts/extract_release_notes.sh "$VERSION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    uses: ./.github/workflows/package-signed-dmg.yml
    secrets: inherit
    with:
      app-version: ${{ needs.prepare.outputs.version }}
      app-build: ${{ needs.prepare.outputs.build_number }}
      dmg-basename: ${{ needs.prepare.outputs.dmg_basename }}
      artifact-name: clawbar-app-${{ needs.prepare.outputs.version }}
      publish-release: true
      release-prerelease: false
      release-tag: ${{ needs.prepare.outputs.tag }}
      release-title: Clawbar ${{ needs.prepare.outputs.version }}
      release-notes: ${{ needs.prepare.outputs.release_notes }}
